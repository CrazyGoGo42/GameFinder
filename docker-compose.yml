services:
  gamefinder-bot:
    build: .
    container_name: gamefinder-discord-bot
    restart: always
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - CLIENT_ID=${CLIENT_ID}
      - NOTIFICATION_INTERVAL=${NOTIFICATION_INTERVAL}
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs:rw
    # No ports needed for Discord bot
    networks:
      - gamefinder-network
    
    # Resource limits (optional)
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

networks:
  gamefinder-network:
    driver: bridge

# Optional: Add logging volume
volumes:
  bot-logs:
    driver: local